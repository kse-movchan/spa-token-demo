name: Main Build

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build
      - name: Build backend
        working-directory: backend
        run: |
          cp -r ../frontend/dist src/main/resources/static
          ./gradlew build

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
      - name: Make package public
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/${{ github.repository_owner }}/packages/container/spa-token-demo" \
            -d '{"visibility":"public"}' || true

  update-deployment:
    needs: docker-build-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout deployment repo
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/kse-labs-deployment
          token: ${{ secrets.DEPLOYMENT_PAT }}
      - name: Update image tag
        run: |
          sed -i "s|image: ghcr.io/${{ github.repository }}:.*|image: ghcr.io/${{ github.repository }}:${{ github.sha }}|" \
            applications/spa-token-demo/deployment.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add applications/spa-token-demo/deployment.yaml
          git diff --cached --quiet || \
            (git commit -m "deploy: spa-token-demo ${{ github.sha }}" && git push)
